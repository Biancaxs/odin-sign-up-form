<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up Form</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main">

        <div class="left">
            <div class="logo">
                <img src="/img/odin-lined.png" alt="odin-logo" class="odin-logo">
                <p class="odin">ODIN</p>
            </div>
            <div>
                <p class="credits">Photo by Halie West on Unsplash</p>
            </div>
        </div>

        <div class="right">
            <div class="text">
                <p>This is not a real online service! You know yoyu need something like this in your life to help you realise your deepest dreams. Sign up now to get started.</p>
                <p>You know you want to.</p>
            </div>
            <div class="form-content">
                <h2>Let's do this!</h2>
                <form action="" class="form">
                    <div>
                        <label for="first-name">FIRST NAME</label><br/>
                        <input type="text" id="first-name">
                    </div>
                    <div>
                        <label for="last-name">LAST NAME</label><br/>
                        <input type="text" id="last-name">
                    </div>
                    <div>
                        <label for="email">EMAIL</label><br/>
                        <input type="email" id="email">
                    </div>
                    <div>
                        <label for="phone">PHONE NUMBER</label><br/>
                        <input type="number" id="phone">
                    </div>
                    <div>
                        <label for="password">PASSWORD</label><br/>
                        <input type="password" id="password" required minlength="4">
                    </div>
                    <div>
                        <label for="confirm-password">CONFIRM PASSWORD</label><br/>
                        <input type="password" id="confirm-password" required minlength="4">
                    </div>
                </form>
            </div>
            <div class="create-account-section">
                <button type="submit" class="create-account">Create Account</button>
                <p>Already have an account? <a href="#">Log in</a></p>
            </div>
        </div>
    </div>

    
</body>
</html>
