<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main">

        <div class="left">
            <div class="logo">
                <img src="/img/odin-lined.png" alt="odin-logo" class="odin-logo">
                <p>ODIN</p>
            </div>
            <div>
                <p>Photo by Halie West on Unsplash</p>
            </div>
        </div>

        <div class="right">
            <div>
                <p>This is not a real online service! You know yoyu need something like this in your life to help you realise your deepest dreans. Sign up now to get started.</p>
                <p>You know you want to.</p>
            </div>
            <div class="form">
                <h2>Let's do this!</h2>
                <form action="">
                    <div>
                        <label for="first-name">FIRST NAME</label>
                        <input type="text" id="first-name">
                    </div>
                    <div>
                        <label for="last-name">LAST NAME</label>
                        <input type="text" id="last-name">
                    </div>
                    <div>
                        <label for="email">EMAIL</label>
                        <input type="email" id="email">
                    </div>
                    <div>
                        <label for="phone">PHONE NUMBER</label>
                        <input type="number" id="phone">
                    </div>
                    <div>
                        <label for="password">PASSWORD</label>
                        <input type="password" id="password">
                    </div>
                    <div>
                        <label for="confirm-password">CONFIRM PASSWORD</label>
                        <input type="password" id="confirm-password">
                    </div>
                </form>
            </div>
            <div>
                <button class="create-account">Create Account</button>
                <p>Already have an account? <a href="#">Log in</a></p>
            </div>
        </div>
    </div>

    
</body>
</html>
